name: mcunet
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy<2.0
  - pillow
  - pip:
      - torch==2.2.2
      - torchvision==0.17.2
      - tensorflow==2.15.0
      - onnx==1.16.1
      - netron
      - tqdm
      - requests
      # NOTA: el paquete `mcunet` del repo MIT tiene un version string inválido
      # ("0.1.1_202605220050") que viola PEP 440 y rompe pip. No lo instalamos
      # como paquete — sólo usamos los modelos .tflite que descarga
      # host/download_models.py. Si necesitas el código Python de MCUNet
      # (TinyNAS, evaluación), clona el repo a mano e impórtalo como path:
      #   git clone https://github.com/mit-han-lab/mcunet.git ~/repos/mcunet
